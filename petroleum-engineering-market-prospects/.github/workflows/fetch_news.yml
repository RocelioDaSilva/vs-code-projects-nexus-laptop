name: Daily News Fetch

on:
  schedule:
    # Run daily at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Fetch news alerts
        run: python automation/fetch_alerts.py

      - name: Commit and push new digests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/ || true
          git diff --cached --quiet || git commit -m "Daily news digest $(date +%Y-%m-%d)"
          git push || true
