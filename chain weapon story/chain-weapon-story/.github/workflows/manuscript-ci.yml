name: Manuscript CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run formatter check (Black)
        run: |
          black --version
          black --check .
      - name: Run linter (Flake8)
        run: |
          flake8 --version
          flake8 --max-line-length=88 || true
      - name: Run tests (pytest)
        run: |
          pytest -q
      - name: Check front-matter (non-blocking initial)
        run: |
          python scripts/check_front_matter.py --path story/ || true
      - name: Try build (best-effort)
        run: |
          if [ -f BUILD-MANUSCRIPT-FOR-REVIEW.py ]; then
            python BUILD-MANUSCRIPT-FOR-REVIEW.py || true
          elif [ -f finished-manuscript/build_manuscript.py ]; then
            python finished-manuscript/build_manuscript.py || true
          else
            echo "No known build target found; skipping."
          fi
