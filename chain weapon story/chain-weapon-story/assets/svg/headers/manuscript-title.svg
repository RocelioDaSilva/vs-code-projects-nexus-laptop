<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-labelledby="titleLabel">
  <title id="titleLabel">Manuscript Title Header</title>
  <defs>
    <pattern id="chainDots" patternUnits="userSpaceOnUse" width="24" height="24">
      <circle cx="6" cy="12" r="4" fill="var(--accent)"/>
      <circle cx="18" cy="12" r="3" fill="var(--accent-2)"/>
    </pattern>
  </defs>
  <style>
    :root{--bg:transparent;--fg:#111;--accent:#6b3e26;--accent-2:#c79a7a;}
    svg{font-family: Georgia, "Times New Roman", serif;}
    .title {font-size:58px; font-weight:700; fill:var(--fg); letter-spacing:2px;}
    .subtitle{font-size:18px; fill:var(--fg); opacity:0.85;}
    .orn {fill:url(#chainDots);}
  </style>
  <rect width="100%" height="100%" fill="none"/>
  <rect x="40" y="110" width="250" height="14" class="orn" rx="7"/>
  <rect x="910" y="110" width="250" height="14" class="orn" rx="7"/>
  <text x="600" y="130" text-anchor="middle" class="title" id="manuscriptTitle">Chain Weapon Story</text>
  <text x="600" y="160" text-anchor="middle" class="subtitle">A Manuscript</text>
</svg>
