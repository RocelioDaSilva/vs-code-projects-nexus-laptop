# Prometheus Alert Rules for GEESP-Angola
# File: monitoring/alert_rules.yml

groups:
  - name: geesp-app-alerts
    interval: 30s
    rules:
      # Application is down
      - alert: GEESPAppDown
        expr: up{job="geesp-app"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "GEESP App is DOWN"
          description: "GEESP application ({{ $labels.instance }}) is not responding for 2+ minutes"

      # High memory usage
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{name="geesp-app"} / (1024*1024) > 800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "GEESP App memory usage is {{ $value }}MB (threshold: 800MB)"

      # High CPU usage
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total{name="geesp-app"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "GEESP App CPU usage is {{ printf \"%.2f%%\" (. | humanize) }} (threshold: 80%)"

      # Slow request times
      - alert: SlowRequestResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow HTTP responses detected"
          description: "95th percentile request latency is {{ $value }}s (threshold: 2s)"

  - name: database-alerts
    interval: 30s
    rules:
      # PostgreSQL is down
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is DOWN"
          description: "PostgreSQL ({{ $labels.instance }}) is not responding for 2+ minutes"

      # High database connections
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of database connections"
          description: "Database has {{ $value }} active connections (threshold: 80)"

      # Database cache hit ratio is low
      - alert: LowCacheHitRatio
        expr: pg_stat_user_tables_idx_blks_hit / (pg_stat_user_tables_idx_blks_hit + pg_stat_user_tables_idx_blks_read) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low database cache hit ratio"
          description: "Cache hit ratio is {{ printf \"%.2f\" (. * 100) }}% (threshold: 90%)"

      # Database replication lag (if applicable)
      - alert: HighReplicationLag
        expr: pg_replication_lag_seconds > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High database replication lag"
          description: "Replication lag is {{ $value }}s (threshold: 5s)"

  - name: redis-alerts
    interval: 30s
    rules:
      # Redis is down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis cache is DOWN"
          description: "Redis ({{ $labels.instance }}) is not responding for 2+ minutes"

      # High memory usage in Redis
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / (1024*1024) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ printf \"%.0f\"MB (. / (1024*1024)) }} (threshold: 500MB)"

      # High eviction rate (cache thrashing)
      - alert: RedisHighEvictions
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High Redis key evictions"
          description: "Redis is evicting {{ printf \"%.0f\" (. * 60) }} keys/min (possible cache thrashing)"

  - name: infrastructure-alerts
    interval: 30s
    rules:
      # High disk usage
      - alert: HighDiskUsage
        expr: node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk {{ $labels.device }} is {{ printf \"%.1f%%\" ((1 - (. / node_filesystem_size_bytes)) * 100 | humanize) }} full"

      # System load high
      - alert: HighSystemLoad
        expr: node_load5 / on(instance) count(node_cpu_seconds_total{mode="system"}) by (instance) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High system load"
          description: "System load average is {{ $value }}"

      # Low available memory
      - alert: LowAvailableMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low available memory"
          description: "Available memory is {{ printf \"%.1f%%\" (. * 100) }} of total"
