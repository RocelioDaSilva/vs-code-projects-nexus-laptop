# ============================================================================
# TOX CONFIGURATION - Test automation for multiple Python versions
# Usage: pip install tox && tox
# Run specific environment: tox -e py311,lint
# ============================================================================

[tox]
envlist = py38,py39,py310,py311,lint,type,coverage
skip_missing_interpreters = True
minversion = 3.20

[testenv]
description = Run unit tests
deps = 
    pytest>=7.0
    pytest-cov>=4.0
    -r{toxinidir}/requirements-app.txt
commands =
    pytest tests/ -v --tb=short
    pytest tests/ --cov=scripts --cov=dashboard --cov-report=term-missing

[testenv:lint]
description = Run linting checks
deps = 
    black>=24.0
    flake8>=7.0
    isort>=5.0
commands =
    black --check scripts/ dashboard/ tests/ --line-length=100
    isort --check-only scripts/ dashboard/ tests/ --profile=black
    flake8 scripts/ dashboard/ tests/ --max-line-length=100

[testenv:format]
description = Auto-format code with black and isort
deps = 
    black>=24.0
    isort>=5.0
commands =
    black scripts/ dashboard/ tests/ --line-length=100
    isort scripts/ dashboard/ tests/ --profile=black

[testenv:type]
description = Run type checking with mypy
deps = 
    mypy>=1.0
    types-PyYAML
    types-requests
    -r{toxinidir}/requirements-app.txt
commands =
    mypy scripts/ --ignore-missing-imports --no-error-summary

[testenv:coverage]
description = Run tests with coverage and generate HTML report
deps = 
    pytest>=7.0
    pytest-cov>=4.0
    coverage>=6.0
    -r{toxinidir}/requirements-app.txt
commands =
    pytest tests/ --cov=scripts --cov=dashboard --cov-report=html --cov-report=term-missing

[testenv:docs]
description = Build documentation with sphinx
deps = 
    sphinx>=6.0
    sphinx-rtd-theme
    sphinx-autodoc-typehints
commands =
    sphinx-build -b html docs/ docs/_build/html

[testenv:clean]
description = Clean up temporary files and caches
skip_install = True
deps = 
allowlist_externals = 
    rm
    find
commands =
    find . -type d -name __pycache__ -exec rm -rf {{}} + 
    find . -type d -name .pytest_cache -exec rm -rf {{}} + 
    find . -type d -name .mypy_cache -exec rm -rf {{}} + 
    find . -type f -name .coverage -delete

# ============================================================================
# Pytest Configuration in Tox
# ============================================================================
[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

# ============================================================================
# Coverage Configuration
# ============================================================================
[coverage:run]
branch = True
source = scripts,dashboard

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
