version: '3.8'

services:
  geesp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geesp-angola-app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - .:/app
      - /app/.streamlit
      - /app/__pycache__
    command: streamlit run geesp_unified_app.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - geesp-network

  # Optional: PostgreSQL for monitoring dashboard (uncomment to enable)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: geesp-postgres
  #   environment:
  #     POSTGRES_DB: geesp_monitoring
  #     POSTGRES_USER: geesp_user
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-geesp_dev}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - geesp-network

networks:
  geesp-network:
    driver: bridge

