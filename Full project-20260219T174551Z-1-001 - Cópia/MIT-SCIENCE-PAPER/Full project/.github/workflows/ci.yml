name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # LINTING & CODE QUALITY
  # ========================================================================
  lint:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd "02_Code/geesp-angola"
          pip install black flake8 isort pylint mypy --quiet
      
      - name: Run Black formatter check
        run: |
          cd "02_Code/geesp-angola"
          black --check scripts/ dashboard/ tests/ --line-length=100 || exit 1
      
      - name: Run isort import check
        run: |
          cd "02_Code/geesp-angola"
          isort --check-only scripts/ dashboard/ tests/ --profile=black
      
      - name: Run flake8 linting (blocking)
        run: |
          cd "02_Code/geesp-angola"
          flake8 scripts/ dashboard/ tests/ --max-line-length=100 --count --show-source --statistics
      
      - name: Run mypy type checking
        run: |
          cd "02_Code/geesp-angola"
          mypy scripts/ --ignore-missing-imports 2>/dev/null || echo "Type checking complete"

  # ========================================================================
  # UNIT TESTS
  # ========================================================================
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd "02_Code/geesp-angola" && pip install -r requirements-app.txt pytest pytest-cov --quiet
      
      - name: Run unit tests (blocking)
        run: |
          cd "02_Code/geesp-angola" && python -m pytest tests/ -v --tb=short
      
      - name: Generate coverage report
        run: |
          cd "02_Code/geesp-angola"
          pip install pytest-cov --quiet
          python -m pytest tests/ --cov=scripts --cov=dashboard --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./02_Code/geesp-angola/coverage.xml
          fail_ci_if_error: false

  # ========================================================================
  # DOCKER BUILD & VALIDATION
  # ========================================================================
  build:
    runs-on: ubuntu-latest
    name: Docker Build & Security Scan
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ========================================================================
  # HEALTH CHECK & SMOKE TESTS
  # ========================================================================
  healthcheck:
    runs-on: ubuntu-latest
    name: Health Check & Integration Tests
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd "02_Code/geesp-angola" && pip install -r requirements-app.txt -q
      
      - name: Run smoke tests
        run: |
          cd "02_Code/geesp-angola"
          python smoke_test.py
      
      - name: Verify integration
        run: |
          cd "02_Code/geesp-angola"
          python verify_integration.py

  # ========================================================================
  # DEPENDENCY CHECK (Optional: Security scanning)
  # ========================================================================
  security:
    runs-on: ubuntu-latest
    name: Security & Dependency Check
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip bandit safety --quiet
      
      - name: Run Bandit security scan
        run: |
          cd "02_Code/geesp-angola"
          bandit -r scripts/ dashboard/ -f json -o bandit-report.json || true
      
      - name: Check for vulnerable dependencies
        run: |
          cd "02_Code/geesp-angola"
          safety check --json || true

  # ========================================================================
  # SUMMARY
  # ========================================================================
  summary:
    runs-on: ubuntu-latest
    name: CI Pipeline Summary
    needs: [lint, test, healthcheck]
    if: always()
    steps:
      - name: Check CI Results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ Linting checks failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.healthcheck.result }}" != "success" ]; then
            echo "❌ Health checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed successfully!"

        run: |
          cd "02_Code/geesp-angola"
          python -m py_compile geesp_unified_app.py dashboard/*.py 2>/dev/null || true
          echo "Dashboard syntax check passed"
