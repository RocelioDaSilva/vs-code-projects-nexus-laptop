# WireGuard Server Configuration Example
# File: /etc/wireguard/wg0.conf
# Generated: 2026-02-10
# Usage: sudo wg-quick up /etc/wireguard/wg0.conf
# Or: sudo systemctl enable wg-quick@wg0

[Interface]
# Server private key (generate with: wg genkey)
PrivateKey = YF7wnVuqWR2CH3MhCU3oZbKdnSAh07+lKfMp1fU7/Hs=

# IP address(es) for this server within the VPN
Address = 10.0.0.1/24

# Listen on UDP port (default: 51820, can customize)
ListenPort = 51820

# Optional: DNS servers for VPN clients
PostUp = resolvectl dns %i 1.1.1.1 8.8.8.8
PostDown = resolvectl dns --reset-all

# Optional: Enable IP forwarding for VPN traffic routing
PostUp = sysctl -w net.ipv4.ip_forward=1
PostUp = sysctl -w net.ipv4.conf.all.proxy_arp=1
PostUp = iptables -A FORWARD -i %i -j ACCEPT
PostUp = iptables -A FORWARD -o %i -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT
PostDown = iptables -D FORWARD -o %i -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
PostDown = sysctl -w net.ipv4.ip_forward=0
PostDown = sysctl -w net.ipv4.conf.all.proxy_arp=0

# Peer 1: Admin workstation
[Peer]
PublicKey = kzb5UtqmByaRxLrUnvXZWJdLh2ycKRxD0ECGF7MQxWc=
AllowedIPs = 10.0.0.2/32

# Peer 2: Field station / dashboard
[Peer]
PublicKey = pFUDO7KLw1qIEfnMh3QhW5xRyXiN7j8K1S6vP8dL2Ec=
AllowedIPs = 10.0.0.3/32

# Peer 3: Data collection device
[Peer]
PublicKey = xKlN4XqT9y3Ug5RmV7BhZ2JwJ0p1Q9f6K7sM8n0T3Y=
AllowedIPs = 10.0.0.4/32

