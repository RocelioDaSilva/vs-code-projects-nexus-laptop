---
# Enhanced Kubernetes StatefulSet for GEESP-Angola with PostgreSQL
# Features: Resource limits, health checks, persistent volumes, rolling updates, monitoring

apiVersion: v1
kind: ConfigMap
metadata:
  name: geesp-config
  namespace: default
data:
  APP_ENV: "production"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  LOG_LEVEL: "INFO"
  CACHE_EXPIRY_SECONDS: "3600"

---
apiVersion: v1
kind: Secret
metadata:
  name: geesp-secrets
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "postgresql://admin:CHANGE_ME@geesp-postgres.default.svc.cluster.local:5432/geesp_db"
  DJANGO_SECRET_KEY: "change-this-to-secure-random-key"
  SMTP_PASSWORD: "change-this-to-email-password"

---
apiVersion: v1
kind: Service
metadata:
  name: geesp-postgres
  namespace: default
  labels:
    app: geesp-postgres
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: geesp-postgres
  ports:
    - port: 5432
      name: postgres
      targetPort: 5432
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: geesp-postgres
  namespace: default
  labels:
    app: geesp-postgres
    version: "14"
spec:
  serviceName: geesp-postgres
  replicas: 1  # Primary replica (use 3 for high availability with Patroni)
  selector:
    matchLabels:
      app: geesp-postgres
  template:
    metadata:
      labels:
        app: geesp-postgres
        version: "14"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: geesp-postgres
      
      # Security context for pod
      securityContext:
        fsGroup: 999  # postgres user group
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      
      # Affinity: spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - geesp-postgres
                topologyKey: kubernetes.io/hostname
      
      # Init container: promote replica if needed
      initContainers:
        - name: init-db
          image: postgres:14-alpine
          command: ["sh", "-c"]
          args:
            - |
              [ -f /var/lib/postgresql/data/PG_VERSION ] && echo "Database already initialized" || \
              echo "Initializing new database instance..."
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      
      containers:
        # Main PostgreSQL container
        - name: postgres
          image: postgres:14-alpine
          imagePullPolicy: IfNotPresent
          
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false  # Need write access to data dir
          
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geesp-secrets
                  key: DATABASE_URL  # Parse password from URL
            - name: POSTGRES_DB
              value: geesp_db
            - name: POSTGRES_INITDB_ARGS
              value: >-
                -c max_connections=200
                -c shared_buffers=256MB
                -c effective_cache_size=1GB
                -c maintenance_work_mem=64MB
                -c checkpoint_completion_target=0.9
                -c wal_buffers=16MB
                -c default_statistics_target=100
                -c random_page_cost=1.1
                -c effective_io_concurrency=200
                -c work_mem=1310kB
                -c min_wal_size=1GB
                -c max_wal_size=4GB
                -c max_worker_processes=4
                -c max_parallel_workers_per_gather=2
                -c max_parallel_workers=4
                -c max_parallel_maintenance_workers=2
          
          # Startup probe: wait for DB to be ready
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U admin -d geesp_db
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # 30 * 5 = 150 seconds max startup time
          
          # Liveness probe: restart if DB is hung
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U admin -d geesp_db && psql -U admin -d geesp_db -c "SELECT 1"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe: ready for connections
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U admin -d geesp_db
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Resource requests & limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql
            - name: postgres-logs
              mountPath: /var/log/postgresql
          
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - pg_ctl stop -D $PGDATA -w -t 30
        
        # PostgreSQL exporter for Prometheus metrics
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: geesp-secrets
                  key: DATABASE_URL
          
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
            optional: true
        - name: postgres-logs
          emptyDir: {}
  
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: fast-ssd  # Use high-performance storage
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: geesp-postgres
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: geesp-postgres
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: geesp-postgres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: geesp-postgres
subjects:
  - kind: ServiceAccount
    name: geesp-postgres
    namespace: default

---
# PodDisruptionBudget: ensure minimum replicas available during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: geesp-postgres-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: geesp-postgres

---
# HorizontalPodAutoscaler for API deployment (for application layer)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geesp-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geesp-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

---
# Network Policy: restrict traffic between pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: geesp-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: geesp-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: geesp-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53

---
# ConfigMap for PostgreSQL extended configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: default
data:
  postgresql.conf: |
    # Logging
    log_min_duration_statement = 1000  # Log queries > 1 second
    log_connections = on
    log_disconnections = on
    log_duration = on
    log_lock_waits = on
    log_statement = 'all'
    
    # Performance
    shared_preload_libraries = 'pg_stat_statements,pg_trgm'
    
    # Replication (if using replicas)
    wal_level = 'replica'
    max_wal_senders = 10
    wal_keep_size = 1GB

---
# ServiceMonitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: geesp-postgres
  namespace: default
spec:
  selector:
    matchLabels:
      app: geesp-postgres
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
