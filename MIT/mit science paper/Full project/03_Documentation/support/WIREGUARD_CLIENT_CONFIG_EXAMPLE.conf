# WireGuard Client Configuration Example
# File: ~/.config/wireguard/geesp-admin.conf or /etc/wireguard/geesp-admin.conf
# Usage: wg-quick up ~/.config/wireguard/geesp-admin.conf
# Or (as root): sudo wg-quick up /etc/wireguard/geesp-admin.conf

[Interface]
# Client private key (generate with: wg genkey)
PrivateKey = 2B3gX1FjV4nH9kR7PqL5MwT8sQ6d2cU3eY5xZnJ9vKm=

# IP address for this client within the VPN
Address = 10.0.0.2/32

# Optional: DNS servers to use over VPN
DNS = 1.1.1.1, 8.8.8.8

# Optional: Kill-switch firewall rules (disconnect internet if VPN drops)
PostUp = iptables -I OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT 2>/dev/null; ip6tables -I OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT 2>/dev/null
PostDown = iptables -D OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT 2>/dev/null; ip6tables -D OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT 2>/dev/null

# Peer: VPN Gateway (WireGuard Server)
[Peer]
# Server's public key (from server's wg genkey output)
PublicKey = YqJ0Kp4vN5hG8dT6xR1wL7mS9qF3jB2Z5cE4nU8y0K=

# VPN server endpoint (IP:port)
Endpoint = vpn.geesp-angola.org:51820

# Routes to send over VPN (10.0.0.0/24 is VPN internal network)
# Add more routes if needed, e.g., AllowedIPs = 10.0.0.0/24, 192.168.1.0/24
AllowedIPs = 10.0.0.0/24

# Keep-alive: send packet every 25s (helps with NAT traversal)
PersistentKeepalive = 25
